<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GauzMem Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel2: #f0f3f6;
      --line: #d8dde5;
      --line2: #c3cad5;
      --text: #171b22;
      --muted: #667085;
      --soft: #8a94a6;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --green: #16875d;
      --green-soft: #dcfce7;
      --amber: #a15c07;
      --amber-soft: #fef3c7;
      --red: #b42318;
      --red-soft: #fee4e2;
      --shadow: 0 8px 24px rgba(19, 28, 45, 0.08);
    }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    body { padding: 20px; }
    button, input, select {
      font: inherit;
      letter-spacing: 0;
    }
    .shell {
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .title {
      display: grid;
      gap: 4px;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 2vw, 32px);
      line-height: 1.15;
      font-weight: 760;
    }
    .subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--line2);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      font-weight: 650;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn.primary {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 14px 0;
    }
    .panel-title {
      font-size: 15px;
      font-weight: 760;
    }
    .panel-meta {
      color: var(--muted);
      font-size: 12px;
    }
    .panel-body { padding: 14px; }
    .summary { grid-column: span 12; }
    .replay { grid-column: span 5; }
    .graph { grid-column: span 7; }
    .metabolism { grid-column: span 12; }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 10px;
    }
    .stat {
      border: 1px solid var(--line);
      background: var(--panel2);
      border-radius: 8px;
      padding: 10px;
      min-height: 74px;
    }
    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .stat .value {
      font-size: 24px;
      font-weight: 780;
      line-height: 1;
      word-break: break-word;
    }
    .stat .hint {
      margin-top: 6px;
      color: var(--soft);
      font-size: 11px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .control-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(180px, 260px);
      gap: 8px;
      margin-bottom: 12px;
    }
    .input, .select {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line2);
      border-radius: 8px;
      padding: 7px 10px;
      background: #fff;
      color: var(--text);
    }
    .timeline {
      display: grid;
      gap: 10px;
      max-height: 720px;
      overflow: auto;
      padding-right: 2px;
    }
    .turn {
      border-left: 3px solid var(--blue);
      background: #fbfcfe;
      border-radius: 0 8px 8px 0;
      padding: 10px 10px 10px 12px;
      display: grid;
      gap: 8px;
    }
    .turn-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .query {
      font-weight: 720;
      font-size: 14px;
      line-height: 1.45;
    }
    .run {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: white;
      display: grid;
      gap: 8px;
    }
    .run-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .run-stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }
    .run-stat {
      border: 1px solid var(--line);
      background: #f8fafc;
      border-radius: 8px;
      padding: 7px 8px;
      min-width: 0;
    }
    .run-stat .k {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
    }
    .run-stat .v {
      color: var(--text);
      font-size: 14px;
      font-weight: 780;
      line-height: 1.1;
    }
    .trace {
      display: grid;
      gap: 5px;
    }
    .trace-row {
      display: grid;
      grid-template-columns: minmax(80px, 150px) minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }
    .trace-term {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
      color: var(--text);
    }
    .trace-bar {
      display: flex;
      height: 8px;
      background: var(--panel2);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .trace-hit.source { background: var(--blue); }
    .trace-hit.graph { background: var(--green); }
    .mini-list {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }
    .mini-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px;
      background: #fafafa;
      line-height: 1.35;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: var(--panel2);
      color: var(--muted);
      border: 1px solid var(--line);
    }
    .chip.blue { background: var(--blue-soft); color: var(--blue); border-color: #bfdbfe; }
    .chip.green { background: var(--green-soft); color: var(--green); border-color: #bbf7d0; }
    .chip.amber { background: var(--amber-soft); color: var(--amber); border-color: #fde68a; }
    .chip.red { background: var(--red-soft); color: var(--red); border-color: #fecaca; }
    .graph-wrap {
      border: 1px solid var(--line);
      background: #fbfcfe;
      border-radius: 8px;
      overflow: hidden;
    }
    #graph-svg {
      width: 100%;
      min-height: 420px;
      display: block;
    }
    .graph-lists {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .list {
      display: grid;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
    }
    .list-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      display: grid;
      gap: 6px;
      background: #fff;
    }
    .item-title {
      font-size: 13px;
      line-height: 1.4;
      font-weight: 690;
    }
    .item-meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .bars {
      display: grid;
      gap: 8px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr) 250px;
      gap: 10px;
      align-items: center;
      min-height: 32px;
    }
    .bar-date {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .bar-stack {
      display: flex;
      height: 18px;
      border-radius: 8px;
      background: var(--panel2);
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .bar {
      height: 100%;
      min-width: 2px;
    }
    .bar.created { background: var(--blue); }
    .bar.selected { background: var(--green); }
    .bar.faded { background: var(--amber); }
    .bar.rejected { background: var(--red); }
    .bar-labels {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 11px;
      color: var(--muted);
    }
    .empty {
      border: 1px dashed var(--line2);
      border-radius: 8px;
      padding: 16px;
      color: var(--muted);
      background: #fbfcfe;
      line-height: 1.5;
    }
    .loading {
      min-height: 160px;
      display: grid;
      place-items: center;
      color: var(--muted);
    }
    @media (max-width: 1080px) {
      .replay, .graph { grid-column: span 12; }
      .stat-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 720px) {
      body { padding: 10px; }
      .topbar, .panel-head { align-items: stretch; flex-direction: column; }
      .actions { justify-content: flex-start; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .control-row, .graph-lists, .run-grid, .run-stats, .bar-row, .trace-row { grid-template-columns: 1fr; }
      #graph-svg { min-height: 320px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div class="title">
        <h1>GauzMem Dashboard</h1>
        <div class="subtitle" id="store-line">读取本地 GauzMem JSONL store</div>
      </div>
      <div class="actions">
        <a class="btn" href="index.html">返回 Dashboard</a>
        <button class="btn primary" id="refresh-btn">刷新</button>
      </div>
    </section>

    <section class="panel summary">
      <div class="panel-head">
        <div>
          <div class="panel-title">总览</div>
          <div class="panel-meta" id="summary-meta">等待加载</div>
        </div>
      </div>
      <div class="panel-body">
        <div class="stat-grid" id="summary-grid"></div>
      </div>
    </section>

    <section class="grid">
      <section class="panel replay">
        <div class="panel-head">
          <div>
            <div class="panel-title">Session Replay</div>
            <div class="panel-meta">每一轮 query、bundle、局部图</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="control-row">
            <input class="input" id="session-filter" placeholder="过滤 session / query">
            <select class="select" id="session-select"></select>
          </div>
          <div class="timeline" id="timeline"></div>
        </div>
      </section>

      <section class="panel graph">
        <div class="panel-head">
          <div>
            <div class="panel-title">Persistent Graph</div>
            <div class="panel-meta">长期保存的 evidence node 与 whyRelevant edge</div>
          </div>
          <input class="input" id="graph-filter" style="max-width:260px" placeholder="过滤 node / edge">
        </div>
        <div class="panel-body">
          <div class="graph-wrap"><svg id="graph-svg" viewBox="0 0 980 430" role="img" aria-label="GauzMem persistent graph"></svg></div>
          <div class="graph-lists">
            <div>
              <div class="panel-meta" style="margin-bottom:8px">Nodes</div>
              <div class="list" id="node-list"></div>
            </div>
            <div>
              <div class="panel-meta" style="margin-bottom:8px">Edges</div>
              <div class="list" id="edge-list"></div>
            </div>
          </div>
        </div>
      </section>
    </section>

    <section class="panel metabolism">
      <div class="panel-head">
        <div>
          <div class="panel-title">Metabolism Timeline</div>
          <div class="panel-meta">每天新增、选中、变淡、拒绝</div>
        </div>
        <div class="row">
          <span class="chip blue">created</span>
          <span class="chip green">selected</span>
          <span class="chip amber">faded</span>
          <span class="chip red">rejected</span>
        </div>
      </div>
      <div class="panel-body">
        <div class="bars" id="metabolism-bars"></div>
      </div>
    </section>
  </main>

  <script>
    const state = { data: null, sessionKey: '', sessionFilter: '', graphFilter: '' };
    const API = '';

    document.getElementById('refresh-btn').addEventListener('click', loadDashboard);
    document.getElementById('session-select').addEventListener('change', event => {
      state.sessionKey = event.target.value;
      renderTimeline();
    });
    document.getElementById('session-filter').addEventListener('input', event => {
      state.sessionFilter = event.target.value.trim().toLowerCase();
      renderSessionSelect();
      renderTimeline();
    });
    document.getElementById('graph-filter').addEventListener('input', event => {
      state.graphFilter = event.target.value.trim().toLowerCase();
      renderGraph();
    });

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[ch]));
    }

    function fmtTime(value) {
      if (!value) return '-';
      const text = String(value);
      return text.replace('T', ' ').replace(/\.\d+Z$/, 'Z');
    }

    function weightLabel(item) {
      return `w ${Number(item.effectiveWeight || 0).toFixed(2)} / ${item.visibility || 'active'}`;
    }

    function stat(label, value, hint) {
      return `<div class="stat"><div class="label">${escapeHtml(label)}</div><div class="value">${escapeHtml(value)}</div><div class="hint">${escapeHtml(hint || '')}</div></div>`;
    }

    async function loadDashboard() {
      document.getElementById('summary-grid').innerHTML = '<div class="loading">加载 GauzMem store...</div>';
      try {
        const response = await fetch(API + '/api/gauzmem/dashboard?maxGraphNodes=120&maxGraphEdges=180', { cache: 'no-store' });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'GauzMem dashboard API failed');
        state.data = data;
        if (!state.sessionKey && data.sessions?.length) state.sessionKey = data.sessions[0].key;
        renderAll();
      } catch (error) {
        document.getElementById('summary-grid').innerHTML = `<div class="empty">加载失败：${escapeHtml(error.message)}</div>`;
      }
    }

    function renderAll() {
      renderSummary();
      renderSessionSelect();
      renderTimeline();
      renderGraph();
      renderMetabolism();
    }

    function renderSummary() {
      const data = state.data || {};
      const summary = data.summary || {};
      document.getElementById('store-line').textContent = `${data.store?.exists ? 'store' : 'store 未创建'} · ${data.store?.root || '-'}`;
      document.getElementById('summary-meta').textContent = `last run ${fmtTime(summary.lastRunAt)} · generated ${fmtTime(data.generatedAt)}`;
      document.getElementById('summary-grid').innerHTML = [
        stat('Nodes', summary.nodeCount || 0, `${summary.retrievableNodeCount || 0} retrievable`),
        stat('Edges', summary.edgeCount || 0, `${summary.retrievableEdgeCount || 0} retrievable`),
        stat('Runs', summary.runCount || 0, `${summary.turnCount || 0} turns`),
        stat('Active', summary.activeNodeCount || 0, 'node visibility'),
        stat('Faint', summary.faintNodeCount || 0, 'node visibility'),
        stat('Dormant', summary.dormantNodeCount || 0, 'node visibility'),
        stat('Retired', summary.retiredNodeCount || 0, 'below threshold'),
        stat('Selected', (summary.selectedNodeEventCount || 0) + '/' + (summary.selectedEdgeEventCount || 0), 'node / edge events'),
      ].join('');
    }

    function filteredSessions() {
      const sessions = state.data?.sessions || [];
      if (!state.sessionFilter) return sessions;
      return sessions.filter(session => {
        const text = [
          session.key,
          session.sessionId,
          session.sessionType,
          ...(session.turns || []).map(turn => turn.query || ''),
        ].join('\n').toLowerCase();
        return text.includes(state.sessionFilter);
      });
    }

    function renderSessionSelect() {
      const select = document.getElementById('session-select');
      const sessions = filteredSessions();
      if (!sessions.length) {
        select.innerHTML = '<option value="">无 session</option>';
        state.sessionKey = '';
        return;
      }
      if (!sessions.some(session => session.key === state.sessionKey)) state.sessionKey = sessions[0].key;
      select.innerHTML = sessions.map(session => (
        `<option value="${escapeHtml(session.key)}"${session.key === state.sessionKey ? ' selected' : ''}>${escapeHtml(session.key)} · ${session.turnCount} turns</option>`
      )).join('');
    }

    function renderTimeline() {
      const box = document.getElementById('timeline');
      const session = filteredSessions().find(item => item.key === state.sessionKey);
      if (!session) {
        box.innerHTML = '<div class="empty">还没有可重演的 session。GauzMem 第一次被调用后这里会出现 timeline。</div>';
        return;
      }
      const turns = session.turns || [];
      box.innerHTML = turns.map(turn => {
        const runs = turn.runs || [];
        return `<div class="turn">
          <div class="turn-head"><span>${escapeHtml(fmtTime(turn.timestamp))}</span><span>${escapeHtml(turn.runIds?.length || 0)} runs</span></div>
          <div class="query">${escapeHtml(turn.query || '(turn metadata only, no linked query)')}</div>
          <div class="row">
            <span class="chip blue">passive ${escapeHtml(turn.passiveRunCount || 0)}</span>
            <span class="chip green">active ${escapeHtml(turn.activeRunCount || 0)}</span>
            <span class="chip">turn ${escapeHtml(turn.turnId || '-')}</span>
          </div>
          ${runs.map(renderRun).join('')}
        </div>`;
      }).join('') || '<div class="empty">这个 session 还没有 turn。</div>';
    }

    function renderRun(run) {
      const nodes = (run.nodes || []).slice(0, 5);
      const edges = (run.edges || []).slice(0, 5);
      const stats = run.stats || {};
      const trace = (run.searchTrace || []).slice(0, 8);
      return `<div class="run">
        <div class="row">
          <span class="chip blue">${escapeHtml(run.callType || 'passive')}</span>
          <span class="chip amber">${escapeHtml(run.retrieveMode || 'unknown')}</span>
          <span class="chip">${escapeHtml(run.runId || '-')}</span>
        </div>
        <div class="run-stats">
          ${runStat('scanned', stats.docsScanned ?? 0, 'docs')}
          ${runStat('source hits', stats.sourceHitCount ?? 0, 'raw matches')}
          ${runStat('windows', stats.sourceWindowCount ?? 0, 'shown to LLM')}
          ${runStat('evidence', stats.sourceEvidenceCount ?? stats.evidenceCount ?? 0, 'source nodes')}
          ${runStat('graph seeds', `${stats.graphSeedCount ?? 0}/${stats.graphEdgeSeedCount ?? 0}`, 'node/edge')}
          ${runStat('constructed', `${stats.constructedNodeCount ?? 0}/${stats.constructedEdgeCount ?? 0}`, 'node/edge')}
          ${runStat('returned', `${run.evidenceIds?.length || 0}/${run.edges?.length || 0}`, 'node/edge')}
          ${runStat('energy', `${stats.energyRemaining ?? '-'}/${stats.energyInitial ?? '-'}`, 'left/initial')}
          ${runStat('mode', run.retrieveMode || 'unknown', 'retrieve')}
          ${runStat('reasoner', stats.reasoner || '-', 'judge')}
        </div>
        ${trace.length ? `<div class="trace">${trace.map(renderTraceRow).join('')}</div>` : `<div class="item-meta">no search trace</div>`}
        <div class="run-grid">
          <div class="mini-list">
            ${nodes.map(node => `<div class="mini-item"><b>${escapeHtml(node.id)}</b><br>${escapeHtml(node.preview || '')}</div>`).join('') || '<div class="mini-item">no evidence nodes</div>'}
          </div>
          <div class="mini-list">
            ${edges.map(edge => `<div class="mini-item"><b>${escapeHtml(edge.mode)}</b><br>${escapeHtml(edge.whyPreview || '')}</div>`).join('') || '<div class="mini-item">no edges</div>'}
          </div>
        </div>
      </div>`;
    }

    function runStat(label, value, hint) {
      return `<div class="run-stat"><div class="k">${escapeHtml(label)}</div><div class="v">${escapeHtml(value)}</div><div class="item-meta">${escapeHtml(hint)}</div></div>`;
    }

    function renderTraceRow(item) {
      const sourceHits = Number(item.sourceHitCount || 0);
      const graphHits = Number(item.graphNodeHits || 0) + Number(item.graphEdgeHits || 0);
      const total = Math.max(1, sourceHits + graphHits);
      const sourceWidth = Math.max(sourceHits ? 4 : 0, Math.round((sourceHits / total) * 100));
      const graphWidth = Math.max(graphHits ? 4 : 0, Math.round((graphHits / total) * 100));
      return `<div class="trace-row">
        <div class="trace-term" title="${escapeHtml(item.pattern || '')}">${escapeHtml(item.pattern || '-')}</div>
        <div class="trace-bar">
          <div class="trace-hit source" style="width:${sourceWidth}%"></div>
          <div class="trace-hit graph" style="width:${graphWidth}%"></div>
        </div>
        <div>${escapeHtml(sourceHits)} src · ${escapeHtml(graphHits)} graph · ${escapeHtml(item.sourceEvidenceCount || 0)} ev</div>
      </div>`;
    }

    function filteredGraph() {
      const graph = state.data?.graph || { nodes: [], edges: [] };
      if (!state.graphFilter) return graph;
      const term = state.graphFilter;
      const nodes = (graph.nodes || []).filter(node => [node.id, node.preview, node.sourceLabel].join('\n').toLowerCase().includes(term));
      const nodeIds = new Set(nodes.map(node => node.id));
      const edgeHits = (graph.edges || []).filter(edge => [edge.id, edge.whyPreview, edge.fromPreview, edge.toPreview].join('\n').toLowerCase().includes(term));
      edgeHits.forEach(edge => { nodeIds.add(edge.from); nodeIds.add(edge.to); });
      return {
        ...graph,
        nodes: (graph.nodes || []).filter(node => nodeIds.has(node.id)),
        edges: (graph.edges || []).filter(edge => nodeIds.has(edge.from) && nodeIds.has(edge.to) && (!term || edgeHits.some(hit => hit.id === edge.id) || nodeIds.has(edge.from) || nodeIds.has(edge.to))),
      };
    }

    function renderGraph() {
      const graph = filteredGraph();
      renderGraphSvg(graph);
      renderNodeList(graph.nodes || []);
      renderEdgeList(graph.edges || []);
    }

    function renderGraphSvg(graph) {
      const svg = document.getElementById('graph-svg');
      const nodes = (graph.nodes || []).slice(0, 42);
      const nodeIds = new Set(nodes.map(node => node.id));
      const edges = (graph.edges || []).filter(edge => nodeIds.has(edge.from) && nodeIds.has(edge.to)).slice(0, 70);
      if (!nodes.length) {
        svg.innerHTML = '<text x="490" y="215" text-anchor="middle" fill="#667085" font-size="16">no graph nodes</text>';
        return;
      }
      const cx = 490, cy = 215;
      const radius = nodes.length < 12 ? 120 : 170;
      const positions = new Map();
      nodes.forEach((node, index) => {
        const angle = (-Math.PI / 2) + (Math.PI * 2 * index / nodes.length);
        const ring = index % 3 === 0 ? radius * 0.62 : radius;
        positions.set(node.id, {
          x: cx + Math.cos(angle) * ring,
          y: cy + Math.sin(angle) * ring,
        });
      });
      const edgeSvg = edges.map(edge => {
        const a = positions.get(edge.from);
        const b = positions.get(edge.to);
        if (!a || !b) return '';
        const color = edge.retrievable ? '#94a3b8' : '#e2e8f0';
        const width = Math.max(1, Math.min(4, 1 + Number(edge.effectiveWeight || 0) * 2));
        return `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${color}" stroke-width="${width}" opacity="0.78"><title>${escapeHtml(edge.whyRelevant || '')}</title></line>`;
      }).join('');
      const nodeSvg = nodes.map(node => {
        const pos = positions.get(node.id);
        const r = Math.max(7, Math.min(18, 7 + Number(node.effectiveWeight || 0) * 9 + Math.min(4, node.degree || 0)));
        const fill = node.retrievable ? '#2563eb' : '#94a3b8';
        const stroke = node.visibility === 'faint' ? '#f59e0b' : node.visibility === 'dormant' ? '#ef4444' : '#ffffff';
        const label = shortText(node.preview || node.id, 18);
        return `<g>
          <circle cx="${pos.x}" cy="${pos.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="3"><title>${escapeHtml(node.preview || '')}</title></circle>
          <text x="${pos.x}" y="${pos.y + r + 13}" text-anchor="middle" fill="#334155" font-size="10">${escapeHtml(label)}</text>
        </g>`;
      }).join('');
      svg.innerHTML = `<rect x="0" y="0" width="980" height="430" fill="#fbfcfe"></rect>${edgeSvg}${nodeSvg}`;
    }

    function renderNodeList(nodes) {
      const box = document.getElementById('node-list');
      box.innerHTML = (nodes || []).slice(0, 80).map(node => `<div class="list-item">
        <div class="item-title">${escapeHtml(node.preview || node.id)}</div>
        <div class="row">
          <span class="chip ${node.retrievable ? 'green' : 'amber'}">${escapeHtml(weightLabel(node))}</span>
          <span class="chip">${escapeHtml(node.degree || 0)} degree</span>
          <span class="chip">${escapeHtml(node.sourceTrust || '-')}</span>
        </div>
        <div class="item-meta">${escapeHtml(node.id)} · ${escapeHtml(node.sourceLabel || '')}</div>
      </div>`).join('') || '<div class="empty">没有 node。</div>';
    }

    function renderEdgeList(edges) {
      const box = document.getElementById('edge-list');
      box.innerHTML = (edges || []).slice(0, 100).map(edge => `<div class="list-item">
        <div class="item-title">${escapeHtml(edge.whyPreview || edge.id)}</div>
        <div class="row">
          <span class="chip blue">${escapeHtml(edge.mode || 'localAssociation')}</span>
          <span class="chip ${edge.retrievable ? 'green' : 'amber'}">${escapeHtml(weightLabel(edge))}</span>
        </div>
        <div class="item-meta">${escapeHtml(shortText(edge.fromPreview || edge.from, 52))} → ${escapeHtml(shortText(edge.toPreview || edge.to, 52))}</div>
      </div>`).join('') || '<div class="empty">没有 edge。</div>';
    }

    function renderMetabolism() {
      const box = document.getElementById('metabolism-bars');
      const rows = state.data?.metabolism?.rows || [];
      if (!rows.length) {
        box.innerHTML = '<div class="empty">还没有 metabolism 事件。第一次 retrieve/construct 后会出现每日变化。</div>';
        return;
      }
      const max = Math.max(1, ...rows.map(row => row.createdNodes + row.createdEdges + row.selectedNodes + row.selectedEdges + row.fadedNodes + row.fadedEdges + row.rejectedNodes + row.rejectedEdges));
      box.innerHTML = rows.map(row => {
        const created = row.createdNodes + row.createdEdges;
        const selected = row.selectedNodes + row.selectedEdges;
        const faded = row.fadedNodes + row.fadedEdges;
        const rejected = row.rejectedNodes + row.rejectedEdges;
        const w = value => `${Math.max(1, Math.round((value / max) * 100))}%`;
        return `<div class="bar-row">
          <div class="bar-date">${escapeHtml(row.date)}</div>
          <div class="bar-stack">
            <div class="bar created" style="width:${w(created)}" title="created ${created}"></div>
            <div class="bar selected" style="width:${w(selected)}" title="selected ${selected}"></div>
            <div class="bar faded" style="width:${w(faded)}" title="faded ${faded}"></div>
            <div class="bar rejected" style="width:${w(rejected)}" title="rejected ${rejected}"></div>
          </div>
          <div class="bar-labels">
            <span>${escapeHtml(row.runs)} runs</span>
            <span>+${escapeHtml(created)}</span>
            <span>selected ${escapeHtml(selected)}</span>
            <span>faded ${escapeHtml(faded)}</span>
            <span>rejected ${escapeHtml(rejected)}</span>
          </div>
        </div>`;
      }).join('');
    }

    function shortText(value, max) {
      const text = String(value || '').replace(/\s+/g, ' ').trim();
      return text.length > max ? text.slice(0, max - 1) + '…' : text;
    }

    loadDashboard();
  </script>
</body>
</html>
