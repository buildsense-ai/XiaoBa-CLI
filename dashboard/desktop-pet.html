<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CatsCo Desktop Companion</title>
  <style>
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Inter, "Segoe UI", sans-serif;
      user-select: none;
    }

    .desktop-pet {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: end center;
      padding-bottom: 12px;
      cursor: grab;
      touch-action: none;
    }

    .desktop-pet.dragging { cursor: grabbing; }

    .pet-button {
      width: 168px;
      height: 150px;
      border: 0;
      padding: 0;
      display: grid;
      place-items: end center;
      background: transparent;
      cursor: pointer;
      touch-action: none;
    }

    .pet-button::before {
      content: "";
      position: absolute;
      width: 112px;
      height: 18px;
      bottom: 20px;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.18);
      filter: blur(10px);
    }

    .cat {
      width: 148px;
      height: 138px;
      object-fit: contain;
      position: relative;
      filter: drop-shadow(0 18px 24px rgba(15, 23, 42, 0.18));
      animation: desktop-breathe 1.35s ease-in-out infinite;
    }

    .bubble {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 136px;
      padding: 8px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.95);
      color: #1f2937;
      border: 1px solid rgba(59, 130, 246, 0.14);
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.14);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      pointer-events: none;
    }

    .bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -7px;
      width: 14px;
      height: 14px;
      transform: translateX(-50%) rotate(45deg);
      background: inherit;
      border-right: 1px solid rgba(59, 130, 246, 0.14);
      border-bottom: 1px solid rgba(59, 130, 246, 0.14);
    }

    @keyframes desktop-breathe {
      0%, 100% { transform: translateY(0) scale(1) rotate(-1deg); }
      50% { transform: translateY(-5px) scale(1.018) rotate(1deg); }
    }
  </style>
</head>
<body>
  <main class="desktop-pet" id="desktop-pet">
    <div class="bubble">我在桌面陪你</div>
    <button class="pet-button" id="desktop-pet-button" type="button" title="打开小八">
      <img class="cat" id="desktop-pet-frame" src="pet/idle/01.png" alt="">
    </button>
  </main>
  <script>
    const frames = ['01.png', '02.png', '03.png', '04.png'].map(name => 'pet/idle/' + name);
    let frameIndex = 0;
    let dragState = null;

    function startDesktopPetDrag(event) {
      if (event.button !== undefined && event.button !== 0) return;
      const shell = document.getElementById('desktop-pet');
      dragState = {
        pointerId: event.pointerId ?? 'mouse',
        lastX: event.screenX,
        lastY: event.screenY,
        moved: false,
      };
      shell?.classList.add('dragging');
      event.currentTarget?.setPointerCapture?.(event.pointerId);
      event.preventDefault();
    }

    async function moveDesktopPetDrag(event) {
      if (!dragState) return;
      if (event.pointerId !== undefined && event.pointerId !== dragState.pointerId) return;
      const deltaX = event.screenX - dragState.lastX;
      const deltaY = event.screenY - dragState.lastY;
      if (Math.abs(deltaX) + Math.abs(deltaY) < 1) return;
      dragState.lastX = event.screenX;
      dragState.lastY = event.screenY;
      if (Math.abs(deltaX) + Math.abs(deltaY) > 3) dragState.moved = true;
      await window.catscoDesktop?.moveDesktopPet?.(deltaX, deltaY);
      event.preventDefault();
    }

    function endDesktopPetDrag(event) {
      if (!dragState) return;
      if (event.pointerId !== undefined && event.pointerId !== dragState.pointerId) return;
      const moved = dragState.moved;
      dragState = null;
      document.getElementById('desktop-pet')?.classList.remove('dragging');
      event.currentTarget?.releasePointerCapture?.(event.pointerId);
      if (!moved) window.catscoDesktop?.showDashboard?.();
      event.preventDefault();
    }

    setInterval(() => {
      const frame = document.getElementById('desktop-pet-frame');
      if (!frame) return;
      frame.src = frames[frameIndex % frames.length];
      frameIndex += 1;
    }, 520);

    const handle = document.getElementById('desktop-pet-button');
    handle?.addEventListener('pointerdown', startDesktopPetDrag);
    handle?.addEventListener('pointermove', moveDesktopPetDrag);
    handle?.addEventListener('pointerup', endDesktopPetDrag);
    handle?.addEventListener('pointercancel', endDesktopPetDrag);
    handle?.addEventListener('dragstart', event => event.preventDefault());
  </script>
</body>
</html>
