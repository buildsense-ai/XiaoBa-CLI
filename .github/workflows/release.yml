name: Desktop Release CD

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  NPM_INSTALL_FLAGS: '--prefer-offline --no-audit --fund=false'

jobs:
  build-mac:
    runs-on: macos-latest
    environment: cn_jiasu
    env:
      XIAOBA_UPDATE_BASE_URL: ${{ secrets.XIAOBA_UPDATE_BASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Build Electron app (macOS)
        run: npm run electron:build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          if-no-files-found: error
          compression-level: 0
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/latest-mac.yml

  build-win:
    runs-on: windows-latest
    environment: cn_jiasu
    env:
      XIAOBA_UPDATE_BASE_URL: ${{ secrets.XIAOBA_UPDATE_BASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Build Electron app (Windows)
        run: npm run electron:build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          compression-level: 0
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml

  build-linux:
    runs-on: ubuntu-latest
    environment: cn_jiasu
    env:
      XIAOBA_UPDATE_BASE_URL: ${{ secrets.XIAOBA_UPDATE_BASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libdrm2 libgbm1 libasound2t64

      - name: Build Electron app (Linux)
        run: npm run electron:build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          if-no-files-found: error
          compression-level: 0
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml

  upload-tos-mac:
    needs: build-mac
    runs-on: ubuntu-latest
    environment: cn_jiasu
    env:
      VOLC_TOS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      VOLC_TOS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      VOLC_TOS_BUCKET: ${{ secrets.VOLC_TOS_BUCKET }}
      VOLC_TOS_REGION: ${{ secrets.VOLC_TOS_REGION }}
      XIAOBA_UPDATE_BASE_URL: ${{ secrets.XIAOBA_UPDATE_BASE_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.VOLC_TOS_REGION }}
      AWS_EC2_METADATA_DISABLED: 'true'
    steps:
      - name: Check TOS upload configuration
        id: tos
        run: |
          if [ -n "$VOLC_TOS_ACCESS_KEY_ID" ] && [ -n "$VOLC_TOS_SECRET_ACCESS_KEY" ] && [ -n "$VOLC_TOS_BUCKET" ] && [ -n "$VOLC_TOS_REGION" ] && [ -n "$XIAOBA_UPDATE_BASE_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "TOS upload is not configured; skipping macOS upload."
          fi

      - name: Download macOS artifacts
        if: steps.tos.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release-mac

      - name: Ensure AWS CLI is available
        if: steps.tos.outputs.enabled == 'true'
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi
          aws --version
          aws configure set default.s3.addressing_style virtual
          aws configure set default.s3.max_concurrent_requests 20
          aws configure set default.s3.max_queue_size 10000
          aws configure set default.s3.multipart_threshold 64MB
          aws configure set default.s3.multipart_chunksize 32MB

      - name: Upload macOS artifacts to Volcengine TOS
        if: steps.tos.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          ENDPOINT_URL="https://tos-s3-${VOLC_TOS_REGION}.volces.com"
          IMMUTABLE_CACHE_CONTROL="public, max-age=31536000, immutable"
          METADATA_CACHE_CONTROL="no-cache, no-store, must-revalidate, max-age=0"

          aws s3 cp release-mac "s3://${VOLC_TOS_BUCKET}/update/" \
            --recursive \
            --exclude "latest*.yml" \
            --endpoint-url "$ENDPOINT_URL" \
            --acl public-read \
            --cache-control "$IMMUTABLE_CACHE_CONTROL" \
            --only-show-errors

          for file in release-mac/latest*.yml; do
            [ -f "$file" ] || continue
            name="$(basename "$file")"
            aws s3 cp "$file" "s3://${VOLC_TOS_BUCKET}/update/$name" \
              --endpoint-url "$ENDPOINT_URL" \
              --acl public-read \
              --cache-control "$METADATA_CACHE_CONTROL" \
              --only-show-errors
          done

  upload-tos-win:
    needs: build-win
    runs-on: ubuntu-latest
    environment: cn_jiasu
    env:
      VOLC_TOS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      VOLC_TOS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      VOLC_TOS_BUCKET: ${{ secrets.VOLC_TOS_BUCKET }}
      VOLC_TOS_REGION: ${{ secrets.VOLC_TOS_REGION }}
      XIAOBA_UPDATE_BASE_URL: ${{ secrets.XIAOBA_UPDATE_BASE_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.VOLC_TOS_REGION }}
      AWS_EC2_METADATA_DISABLED: 'true'
    steps:
      - name: Check TOS upload configuration
        id: tos
        run: |
          if [ -n "$VOLC_TOS_ACCESS_KEY_ID" ] && [ -n "$VOLC_TOS_SECRET_ACCESS_KEY" ] && [ -n "$VOLC_TOS_BUCKET" ] && [ -n "$VOLC_TOS_REGION" ] && [ -n "$XIAOBA_UPDATE_BASE_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "TOS upload is not configured; skipping Windows upload."
          fi

      - name: Download Windows artifacts
        if: steps.tos.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-win

      - name: Ensure AWS CLI is available
        if: steps.tos.outputs.enabled == 'true'
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi
          aws --version
          aws configure set default.s3.addressing_style virtual
          aws configure set default.s3.max_concurrent_requests 20
          aws configure set default.s3.max_queue_size 10000
          aws configure set default.s3.multipart_threshold 64MB
          aws configure set default.s3.multipart_chunksize 32MB

      - name: Upload Windows artifacts to Volcengine TOS
        if: steps.tos.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          ENDPOINT_URL="https://tos-s3-${VOLC_TOS_REGION}.volces.com"
          IMMUTABLE_CACHE_CONTROL="public, max-age=31536000, immutable"
          METADATA_CACHE_CONTROL="no-cache, no-store, must-revalidate, max-age=0"

          aws s3 cp release-win "s3://${VOLC_TOS_BUCKET}/update/" \
            --recursive \
            --exclude "latest*.yml" \
            --endpoint-url "$ENDPOINT_URL" \
            --acl public-read \
            --cache-control "$IMMUTABLE_CACHE_CONTROL" \
            --only-show-errors

          for file in release-win/latest*.yml; do
            [ -f "$file" ] || continue
            name="$(basename "$file")"
            aws s3 cp "$file" "s3://${VOLC_TOS_BUCKET}/update/$name" \
              --endpoint-url "$ENDPOINT_URL" \
              --acl public-read \
              --cache-control "$METADATA_CACHE_CONTROL" \
              --only-show-errors
          done

  upload-tos-linux:
    needs: build-linux
    runs-on: ubuntu-latest
    environment: cn_jiasu
    env:
      VOLC_TOS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      VOLC_TOS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      VOLC_TOS_BUCKET: ${{ secrets.VOLC_TOS_BUCKET }}
      VOLC_TOS_REGION: ${{ secrets.VOLC_TOS_REGION }}
      XIAOBA_UPDATE_BASE_URL: ${{ secrets.XIAOBA_UPDATE_BASE_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.VOLC_TOS_REGION }}
      AWS_EC2_METADATA_DISABLED: 'true'
    steps:
      - name: Check TOS upload configuration
        id: tos
        run: |
          if [ -n "$VOLC_TOS_ACCESS_KEY_ID" ] && [ -n "$VOLC_TOS_SECRET_ACCESS_KEY" ] && [ -n "$VOLC_TOS_BUCKET" ] && [ -n "$VOLC_TOS_REGION" ] && [ -n "$XIAOBA_UPDATE_BASE_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "TOS upload is not configured; skipping Linux upload."
          fi

      - name: Download Linux artifacts
        if: steps.tos.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release-linux

      - name: Ensure AWS CLI is available
        if: steps.tos.outputs.enabled == 'true'
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi
          aws --version
          aws configure set default.s3.addressing_style virtual
          aws configure set default.s3.max_concurrent_requests 20
          aws configure set default.s3.max_queue_size 10000
          aws configure set default.s3.multipart_threshold 64MB
          aws configure set default.s3.multipart_chunksize 32MB

      - name: Upload Linux artifacts to Volcengine TOS
        if: steps.tos.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          ENDPOINT_URL="https://tos-s3-${VOLC_TOS_REGION}.volces.com"
          IMMUTABLE_CACHE_CONTROL="public, max-age=31536000, immutable"
          METADATA_CACHE_CONTROL="no-cache, no-store, must-revalidate, max-age=0"

          aws s3 cp release-linux "s3://${VOLC_TOS_BUCKET}/update/" \
            --recursive \
            --exclude "latest*.yml" \
            --endpoint-url "$ENDPOINT_URL" \
            --acl public-read \
            --cache-control "$IMMUTABLE_CACHE_CONTROL" \
            --only-show-errors

          for file in release-linux/latest*.yml; do
            [ -f "$file" ] || continue
            name="$(basename "$file")"
            aws s3 cp "$file" "s3://${VOLC_TOS_BUCKET}/update/$name" \
              --endpoint-url "$ENDPOINT_URL" \
              --acl public-read \
              --cache-control "$METADATA_CACHE_CONTROL" \
              --only-show-errors
          done

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    environment: cn_jiasu
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release-mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: XiaoBa ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-mac/*
            release-win/*
            release-linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-tos:
    needs: [upload-tos-mac, upload-tos-win, upload-tos-linux]
    runs-on: ubuntu-latest
    environment: cn_jiasu
    env:
      XIAOBA_UPDATE_BASE_URL: ${{ secrets.XIAOBA_UPDATE_BASE_URL }}
      VOLC_TOS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      VOLC_TOS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      VOLC_TOS_BUCKET: ${{ secrets.VOLC_TOS_BUCKET }}
      VOLC_TOS_REGION: ${{ secrets.VOLC_TOS_REGION }}
    steps:
      - name: Check TOS upload configuration
        id: tos
        run: |
          if [ -n "$VOLC_TOS_ACCESS_KEY_ID" ] && [ -n "$VOLC_TOS_SECRET_ACCESS_KEY" ] && [ -n "$VOLC_TOS_BUCKET" ] && [ -n "$VOLC_TOS_REGION" ] && [ -n "$XIAOBA_UPDATE_BASE_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "TOS upload is not configured; skipping metadata verification."
          fi

      - name: Verify published update metadata
        if: steps.tos.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          for file in latest.yml latest-mac.yml latest-linux.yml; do
            url="${XIAOBA_UPDATE_BASE_URL}/${file}"
            status="$(curl -I -L -s -o /dev/null -w "%{http_code}" "$url")"
            if [ "$status" != "200" ]; then
              echo "Metadata check failed for $url (HTTP $status)"
              exit 1
            fi
          done
